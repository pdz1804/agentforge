# Held-out split for the "assistant" template manifest (see assistant.dev.yaml).
# Task id + input are disjoint from the dev split. manifest_id matches the
# "assistant" builder template.
id: assistant.held_out
manifest_id: assistant
split: held_out
tasks:
  - id: held-1
    input: "In one short sentence, why is the sky blue?"
    scoring_mode: llm_judge
    rubric:
      - "mentions light scattering (Rayleigh scattering) as the cause"
      - "is a single concise sentence"
    pass_threshold: 0.6
