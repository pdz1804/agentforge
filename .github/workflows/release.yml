name: Release (PyPI)

# Publishes the agent-core distribution (PyPI name `pdz-agent-core`, imported
# as `agent_core`) to PyPI on a version tag using PyPI Trusted Publishing
# (OIDC) -- no API token or long-lived secret is stored in this repository.
# One-time setup on pypi.org is required (a "pending publisher" for project
# `pdz-agent-core`, repo `pdz1804/agentforge`, workflow `release.yml`,
# environment `pypi`); see docs/release.md.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build + validate distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Verify tag matches pyproject version (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::tag ${TAG} does not match pyproject version v${PKG_VERSION}"
            exit 1
          fi
          echo "tag ${TAG} matches pyproject version v${PKG_VERSION}"

      - name: Validate metadata (twine check -- render README, license, classifiers)
        run: twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/agent-core/dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    # A dedicated environment lets the PyPI trusted-publisher config scope the
    # OIDC identity, and lets you require a manual approval on the environment
    # if desired. Never run on forks.
    environment:
      name: pypi
      url: https://pypi.org/p/pdz-agent-core
    permissions:
      # OIDC token minting for Trusted Publishing. No PyPI secret needed.
      id-token: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # skip-existing so re-running a tag that is already on PyPI is a
          # no-op instead of a hard failure (idempotent re-runs).
          skip-existing: true
          print-hash: true
