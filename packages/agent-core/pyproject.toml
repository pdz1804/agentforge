[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pdz-agent-core"
version = "0.1.2"
description = "Unified Agent Core — declarative agent manifests, pluggable registries, and interfaces for the AgentForge harness."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "pdz1804" }]
keywords = ["agents", "llm", "langgraph", "agent-framework", "ai", "openai", "anthropic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "langgraph>=0.2",
    "langgraph-checkpoint-sqlite>=2.0",
    "httpx>=0.27",
    "asyncpg>=0.29",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.39"]
openai = ["openai>=1.40"]
mem0 = ["mem0ai>=0.1"]
mcp = ["mcp>=1.0"]
postgres = ["pgvector>=0.3.6"]
dev = ["pytest>=8.0", "pgvector>=0.3.6"]

[project.urls]
Homepage = "https://github.com/pdz1804/agentforge"
Repository = "https://github.com/pdz1804/agentforge"
Documentation = "https://github.com/pdz1804/agentforge/tree/main/docs"
Issues = "https://github.com/pdz1804/agentforge/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
